<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Transaksi Baru — Finance Daily QRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6C4CF0">
  <link rel="apple-touch-icon" href="assets/icon/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finance QRIS">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/transaction.css?v=4">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <a href="dashboard.html" class="icon-btn"><span class="ms">close</span></a>
        <h1 id="page-title">Transaksi Baru</h1>
      </div>
    </div>

    <div class="content">
      <!-- jenis -->
      <div style="display:flex;gap:10px">
        <button class="btn green" id="j-income" style="border:1.5px solid transparent"><span class="ms">south_west</span>Income</button>
        <button class="btn btn-ghost" id="j-expense" style="border:1.5px solid var(--line)"><span class="ms">north_east</span>Expense</button>
      </div>

      <!-- nominal -->
      <div class="card" style="margin-top:16px;padding:18px">
        <div class="fld" style="margin:0 0 8px">Nominal</div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="num" id="sym" style="font-size:22px;color:var(--muted2)">Rp</span>
          <input id="amount" class="num" inputmode="numeric" placeholder="0" style="border:none;outline:none;background:transparent;font-size:30px;color:var(--ink);width:100%;letter-spacing:-.5px">
        </div>
        <div class="seg" id="cur" style="margin-top:14px;background:#EBE7FA">
          <button data-cur="IDR" class="active">🇮🇩 IDR</button>
          <button data-cur="USD">🇺🇸 USD</button>
          <button data-cur="KHR">🇰🇭 KHR</button>
        </div>
      </div>

      <!-- tanggal + jam -->
      <div style="display:flex;gap:12px;margin-top:14px">
        <div style="flex:1">
          <label class="fld" style="margin-top:0">Tanggal</label>
          <div class="input"><span class="ms" style="color:var(--primary)">calendar_today</span><input id="date" type="date"></div>
        </div>
        <div style="flex:0 0 130px">
          <label class="fld" style="margin-top:0">Jam (auto)</label>
          <div class="input"><span class="ms" style="color:var(--secondary)">schedule</span><input id="time" readonly></div>
        </div>
      </div>

      <!-- kategori -->
      <label class="fld">Kategori</label>
      <div class="chips" id="cats"></div>

      <label class="fld">Subkategori</label>
      <div class="input"><input id="subcategory" placeholder="mis. Menu makanan"></div>

      <label class="fld">Deskripsi</label>
      <div class="input"><input id="description" placeholder="Keterangan singkat transaksi"></div>

      <label class="fld">Metode Pembayaran</label>
      <div class="chips" id="methods">
        <button class="chip pill active" data-m="QRIS">QRIS</button>
        <button class="chip" data-m="Tunai">Tunai</button>
        <button class="chip" data-m="Transfer">Transfer</button>
        <button class="chip" data-m="Kartu">Kartu</button>
        <button class="chip" data-m="E-Wallet">E-Wallet</button>
      </div>

      <label class="fld">Status</label>
      <div style="display:flex;gap:8px">
        <button class="chip pill active" id="st-ok" data-s="Sukses" style="flex:1;justify-content:center;text-align:center">Sukses</button>
        <button class="chip" id="st-pend" data-s="Pending" style="flex:1;text-align:center">Pending</button>
      </div>

      <label class="fld">Nomor Referensi</label>
      <div class="input"><span class="ms" style="color:var(--secondary)">tag</span><input id="reference" class="num"><span class="ms" id="regen" style="cursor:pointer;color:var(--primary)">autorenew</span></div>

      <label class="fld">Catatan</label>
      <div class="input"><textarea id="note" rows="2" placeholder="Catatan tambahan…"></textarea></div>

      <label class="fld">Lampiran (foto struk)</label>
      <input type="file" id="attach-file" accept="image/*" class="hidden">
      <div id="attach-drop" class="attach-drop">
        <span class="ms" style="font-size:26px;color:var(--primary)">add_a_photo</span>
        <div style="font-size:12px;font-weight:600;color:var(--muted2)">Ketuk untuk unggah foto struk</div>
        <div class="muted" style="font-size:10.5px">JPG/PNG · disimpan bersama transaksi</div>
      </div>
      <div id="attach-preview" class="attach-preview hidden">
        <img id="attach-img" alt="struk">
        <button type="button" id="attach-remove" class="attach-remove"><span class="ms" style="font-size:18px">delete</span></button>
      </div>

      <button class="btn green" id="save" style="margin-top:22px"><span class="ms">check</span>Simpan Transaksi</button>
    </div>
  </div>

  <script src="js/api.js?v=4"></script>
  <script src="js/currency.js?v=4"></script>
  <script src="js/utils.js?v=4"></script>
  <script src="js/store.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/transaction.js?v=4"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
